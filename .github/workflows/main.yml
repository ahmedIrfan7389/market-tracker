name: Market Tracker Daily Run

# bump: force GitHub to re-evaluate workflows (no-op)

on:
  schedule:
    # Runs every day at 5:00 PM PKT (12:00 PM UTC)
    - cron: "0 12 * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        # This exact line prevents the 'ModuleNotFoundError' you saw earlier
        run: |
          pip install yfinance requests python-dotenv

      - name: Run Tracker
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python main.py
